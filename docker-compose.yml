services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: szmidtkepl:latest
    container_name: szmidtkepl
    restart: unless-stopped
    # nginx na VPS słucha 80/443 i proxy_pass na 127.0.0.1:3000 — kontener
    # publikuje port tylko lokalnie, nie na światowy interfejs.
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # -------------------------------------------------------------------------
  # Plausible — self-hosted analytics (iteracja 16)
  # Stack: plausible (app) + postgres (users/sites) + clickhouse (events).
  # Docs: https://github.com/plausible/community-edition
  # Subdomena: analytics.szmidtke.pl → nginx → 127.0.0.1:8000
  # -------------------------------------------------------------------------
  plausible_db:
    image: postgres:16-alpine
    container_name: plausible_db
    restart: unless-stopped
    volumes:
      - plausible_db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${PLAUSIBLE_POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=plausible_db
    networks:
      - plausible_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d plausible_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  plausible_events_db:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: plausible_events_db
    restart: unless-stopped
    volumes:
      - plausible_events_data:/var/lib/clickhouse
      - ./scripts/plausible/clickhouse-config.xml:/etc/clickhouse-server/config.d/logging.xml:ro
      - ./scripts/plausible/clickhouse-user-config.xml:/etc/clickhouse-server/users.d/logging.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - plausible_net
    healthcheck:
      # 127.0.0.1 wymuszone (nie `localhost`) — na VPS bez IPv6 `localhost`
      # resolvuje do ::1, a clickhouse słucha tylko na IPv4.
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  plausible:
    image: ghcr.io/plausible/community-edition:v2.1
    container_name: plausible
    restart: unless-stopped
    # NIE `db init-admin` — w Plausible CE v2.x wymaga zmiennych ADMIN_USER_*,
    # których tu nie ustawiamy, więc kontener crashuje przy pierwszym starcie.
    # Admin tworzony osobno: `docker compose exec plausible /entrypoint.sh db
    # create-admin-user ...` (DEPLOY.md krok 4, sekcja "Pierwszy użytkownik admin").
    # CREATE DATABASE przez clickhouse-client przed migrate — `db migrate` samo
    # nie tworzy bazy w ClickHouse (postgres auto-tworzy przez POSTGRES_DB env,
    # ClickHouse obrazu nie ma takiego env).
    command: >
      sh -c "apk add --no-cache curl &&
             until curl -sf http://plausible_events_db:8123/ping >/dev/null; do sleep 2; done &&
             curl -sf 'http://plausible_events_db:8123/?query=CREATE+DATABASE+IF+NOT+EXISTS+plausible_events_db' &&
             /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      plausible_db:
        condition: service_healthy
      plausible_events_db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - plausible_data:/var/lib/plausible
    environment:
      - BASE_URL=https://analytics.szmidtke.pl
      - SECRET_KEY_BASE=${PLAUSIBLE_SECRET_KEY_BASE}
      - TOTP_VAULT_KEY=${PLAUSIBLE_TOTP_VAULT_KEY}
      - DATABASE_URL=postgres://postgres:${PLAUSIBLE_POSTGRES_PASSWORD:-postgres}@plausible_db:5432/plausible_db
      - CLICKHOUSE_DATABASE_URL=http://plausible_events_db:8123/plausible_events_db
      - DISABLE_REGISTRATION=true
    networks:
      - plausible_net

volumes:
  plausible_db_data:
  plausible_events_data:
  plausible_data:

networks:
  plausible_net:
